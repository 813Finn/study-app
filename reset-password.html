<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neues Passwort – StudyApp</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
    }
    .reset-card { width: 100%; max-width: 400px; }
    .reset-title {
      font-family: 'Eczar', Georgia, serif;
      font-size: var(--text-2xl);
      font-weight: 800;
      margin-bottom: var(--sp-2);
    }
    .reset-sub { font-size: var(--text-sm); color: var(--fg-3); margin-bottom: var(--sp-6); }
    .reset-error { font-size: var(--text-sm); color: var(--grade-bad); margin-top: var(--sp-3); display: none; }
    .reset-error.visible { display: block; }
  </style>
</head>
<body>
  <div class="reset-card card anim-up-1">
    <div class="reset-title">Passwort festlegen</div>
    <p class="reset-sub">Wähle ein Passwort für deinen Account.</p>

    <div class="form-group">
      <label class="form-label" for="newPassword">Neues Passwort</label>
      <input class="form-input" type="password" id="newPassword"
             placeholder="Mindestens 6 Zeichen" autocomplete="new-password" />
    </div>

    <p class="reset-error" id="resetError"></p>

    <button class="btn btn-primary" id="saveBtn" style="width:100%;margin-top:var(--sp-6)">
      Passwort speichern
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    (function () {
      const t = localStorage.getItem('sf_theme');
      document.documentElement.setAttribute('data-theme',
        (t === 'dark' || t === 'light') ? t :
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      );
    })();

    const saveBtn  = document.getElementById('saveBtn');
    const errorEl  = document.getElementById('resetError');
    const input    = document.getElementById('newPassword');

    // PKCE flow: exchange code for session before allowing password update
    (async () => {
      const code = new URLSearchParams(window.location.search).get('code');
      if (code) {
        saveBtn.disabled = true;
        saveBtn.textContent = '…';
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) {
          errorEl.textContent = 'Ungültiger oder abgelaufener Link.';
          errorEl.classList.add('visible');
        } else {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Passwort speichern';
        }
      }
    })();

    async function save() {
      const password = input.value;
      if (!password || password.length < 6) {
        errorEl.textContent = 'Mindestens 6 Zeichen.';
        errorEl.classList.add('visible');
        return;
      }
      saveBtn.disabled = true;
      saveBtn.textContent = '…';
      errorEl.classList.remove('visible');

      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Passwort speichern';
        return;
      }
      window.location.replace('index.html');
    }

    saveBtn.addEventListener('click', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
  </script>
</body>
</html>
