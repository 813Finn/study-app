<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow – Kalender</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    /* ── Layout ── */
    .kalender-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: var(--sp-8);
      align-items: start;
    }

    /* ── Kalender ── */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-5);
    }

    .calendar-month {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--fg);
    }

    .calendar-nav-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-sm);
      color: var(--fg-2);
      transition: background-color var(--t-fast), color var(--t-fast);
    }

    .calendar-nav-btn:hover {
      background-color: var(--bg-subtle);
      color: var(--fg);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-header {
      text-align: center;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--fg-3);
      padding: var(--sp-2) 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cal-day {
      position: relative;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--r-sm);
      cursor: default;
      transition: background-color var(--t-fast);
      color: var(--fg-2);
    }

    .cal-day.empty {
      cursor: default;
    }

    .cal-day.today {
      background-color: var(--accent-dim);
      color: var(--accent-on-bg);
      font-weight: 700;
    }

    .cal-day.past {
      color: var(--fg-3);
      opacity: 0.5;
    }

    .cal-day.study-day {
      background-color: oklch(0.60 0.17 235 / 0.18);
      color: var(--cal-study);
      font-weight: 600;
    }

    .cal-day.exam-day {
      background-color: oklch(0.54 0.22 295 / 0.18);
      color: var(--cal-exam);
      font-weight: 700;
    }

    .cal-day.today.exam-day {
      background-color: oklch(0.54 0.22 295 / 0.25);
    }

    /* Dot indicators */
    .cal-day .dot-row {
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
    }

    .cal-dot {
      width: 4px;
      height: 4px;
      border-radius: var(--r-full);
    }

    .cal-dot.exam  { background-color: var(--cal-exam); }
    .cal-dot.study { background-color: var(--cal-study); }

    /* Legend */
    .cal-legend {
      display: flex;
      gap: var(--sp-4);
      margin-top: var(--sp-4);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--fg-3);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: var(--r-full);
    }

    /* ── Tag-Detail ── */
    .day-detail {
      margin-top: var(--sp-4);
      padding: var(--sp-4) var(--sp-5);
      background-color: var(--bg-subtle);
      border-radius: var(--r-md);
      border: 1px solid var(--border-subtle);
    }

    .day-detail-date {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--sp-3);
    }

    .day-detail-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) 0;
      font-size: var(--text-sm);
      color: var(--fg);
    }

    .day-detail-item + .day-detail-item {
      border-top: 1px solid var(--border-subtle);
    }

    .day-detail-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--r-full);
      flex-shrink: 0;
    }

    .day-detail-dot.exam  { background-color: var(--cal-exam); }
    .day-detail-dot.study { background-color: var(--cal-study); }
    .day-detail-dot.today { background-color: var(--accent-on-bg); }

    .day-detail-empty {
      font-size: var(--text-sm);
      color: var(--fg-3);
    }

    /* Klickbare Tage */
    .cal-day:not(.empty) {
      cursor: pointer;
    }

    .cal-day:not(.empty):hover:not(.today) {
      background-color: var(--bg-subtle);
    }

    .cal-day.selected {
      outline: 2px solid var(--accent-on-bg);
      outline-offset: 1px;
    }

    /* ── Sidebar ── */
    .sidebar-card + .sidebar-card {
      margin-top: var(--sp-6);
    }

    /* Exam list in sidebar */
    .exam-sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) 0;
      gap: var(--sp-3);
    }

    .exam-sidebar-item + .exam-sidebar-item {
      border-top: 1px solid var(--border-subtle);
    }

    .exam-sidebar-name {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--fg);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .exam-sidebar-date {
      font-size: var(--text-xs);
      color: var(--fg-3);
      white-space: nowrap;
    }

    /* Settings */
    .settings-grid {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    @media (max-width: 900px) {
      .kalender-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-header">
      <h1>Kalender</h1>
      <p>Klausuren eintragen, Lernplan einrichten und deinen Fortschritt im Blick behalten.</p>
    </div>

    <div class="kalender-layout">
      <!-- Linke Spalte: Kalender -->
      <div>
        <div class="card">
          <!-- Monats-Navigation -->
          <div class="calendar-nav">
            <button class="calendar-nav-btn" id="prevMonth" aria-label="Vorheriger Monat">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <span class="calendar-month" id="calMonthLabel"></span>
            <button class="calendar-nav-btn" id="nextMonth" aria-label="Nächster Monat">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
          </div>

          <!-- Grid -->
          <div class="calendar-grid" id="calGrid" role="grid" aria-label="Kalender"></div>

          <!-- Detail-Panel (erscheint beim Klick auf einen Tag) -->
          <div id="dayDetail" class="day-detail" hidden>
            <div class="day-detail-inner">
              <div class="day-detail-date" id="dayDetailDate"></div>
              <div id="dayDetailContent"></div>
            </div>
          </div>

          <!-- Legende -->
          <div class="cal-legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--accent-on-bg)"></div>
              Heute
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--cal-study)"></div>
              Lerntag
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--cal-exam)"></div>
              Klausur
            </div>
          </div>
        </div>
      </div>

      <!-- Rechte Spalte: Sidebar -->
      <div>
        <!-- Klausur hinzufügen -->
        <div class="card sidebar-card">
          <div class="card-header">
            <div class="card-title">Klausur eintragen</div>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label" for="examSubject">Fach</label>
              <input class="form-input" type="text" id="examSubject"
                     placeholder="z.B. Analysis, BWL I" maxlength="80" />
            </div>
            <div class="form-group">
              <label class="form-label" for="examDate">Datum</label>
              <input class="form-input" type="date" id="examDate" />
            </div>
            <button class="btn btn-primary" id="addExamBtn" style="width:100%; margin-top:var(--sp-2)">
              Klausur hinzufügen
            </button>
          </div>
        </div>

        <!-- Lernplan-Einstellungen -->
        <div class="card sidebar-card">
          <div class="card-header">
            <div>
              <div class="card-title">Lernplan</div>
              <div class="card-subtitle">Einstellungen für alle Klausuren</div>
            </div>
          </div>
          <div class="settings-grid">
            <div class="form-group">
              <label class="form-label">An welchen Tagen lernst du?</label>
              <div class="checkbox-group">
                <input type="checkbox" class="day-checkbox" id="day1" value="1" />
                <label class="day-label" for="day1">Mo</label>

                <input type="checkbox" class="day-checkbox" id="day2" value="2" />
                <label class="day-label" for="day2">Di</label>

                <input type="checkbox" class="day-checkbox" id="day3" value="3" />
                <label class="day-label" for="day3">Mi</label>

                <input type="checkbox" class="day-checkbox" id="day4" value="4" />
                <label class="day-label" for="day4">Do</label>

                <input type="checkbox" class="day-checkbox" id="day5" value="5" />
                <label class="day-label" for="day5">Fr</label>

                <input type="checkbox" class="day-checkbox" id="day6" value="6" />
                <label class="day-label" for="day6">Sa</label>

                <input type="checkbox" class="day-checkbox" id="day0" value="0" />
                <label class="day-label" for="day0">So</label>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="hoursInput">Stunden pro Lerntag</label>
              <div class="input-with-unit">
                <input class="form-input" type="number" id="hoursInput"
                       min="0.5" max="12" step="0.5" value="2" />
                <span class="input-unit">Stunden</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="weeksInput">Plan startet … vor der Klausur</label>
              <div class="input-with-unit">
                <input class="form-input" type="number" id="weeksInput"
                       min="1" max="16" step="1" value="4" />
                <span class="input-unit">Wochen</span>
              </div>
            </div>

            <button class="btn btn-secondary" id="saveSettingsBtn" style="width:100%">
              Einstellungen speichern
            </button>
          </div>
        </div>

        <!-- Klausurliste -->
        <div class="card sidebar-card">
          <div class="card-header">
            <div class="card-title">Eingetragene Klausuren</div>
          </div>
          <div id="examSidebarList">
            <div class="empty-state">
              <div class="empty-state-icon">🎓</div>
              <p>Noch keine Klausuren.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/kalender.js"></script>
</body>
</html>
