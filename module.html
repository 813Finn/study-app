<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow – Module</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    /* ── Summary bar ── */
    .grade-summary {
      display: flex;
      gap: var(--sp-4);
      margin-bottom: var(--sp-8);
      flex-wrap: wrap;
    }

    /* ── Semester block ── */
    .semester-block {
      margin-bottom: var(--sp-6);
    }

    .semester-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-4) var(--sp-5);
      background-color: var(--bg-subtle);
      border-radius: var(--r-md) var(--r-md) 0 0;
      cursor: pointer;
      user-select: none;
      transition: background-color var(--t-fast);
    }

    .semester-header:hover {
      background-color: var(--bg-muted);
    }

    .semester-header-left {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }

    .semester-name {
      font-family: 'Eczar', Georgia, serif;
      font-size: var(--text-md);
      font-weight: 700;
      color: var(--fg);
    }

    .semester-avg {
      font-family: 'Eczar', Georgia, serif;
      font-size: var(--text-xl);
      font-weight: 800;
      line-height: 1;
    }

    .semester-body {
      border: 1px solid var(--border-subtle);
      border-top: none;
      border-radius: 0 0 var(--r-md) var(--r-md);
      overflow: hidden;
    }

    /* ── Flex-basierte Modulliste ── */
    .subjects-list {
      width: 100%;
    }

    /* Header-Zeile */
    .subjects-header {
      display: flex;
      align-items: center;
      padding: var(--sp-2) var(--sp-4);
      background-color: var(--bg-elevated);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Jede Modul-Zeile */
    .subject-row-flex {
      display: flex;
      align-items: center;
      padding: var(--sp-3) var(--sp-4);
      min-height: 52px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .subject-row-flex:last-of-type {
      border-bottom: none;
    }

    .subject-item:nth-child(even) .subject-row-flex {
      background-color: var(--bg);
    }

    .subject-item:nth-child(odd) .subject-row-flex {
      background-color: var(--bg-elevated);
    }

    /* Spalten-Breiten */
    .col-name    { flex: 1; min-width: 0; font-weight: 500; }
    /* Input im Edit-Mode nicht unbegrenzt wachsen lassen */
    .col-name .form-input { max-width: 320px; }
    .col-note    { width: 80px; flex-shrink: 0; }
    .col-note .form-input { width: 100%; }
    .col-ects    { width: 80px; flex-shrink: 0; }
    .col-ects .form-input { width: 100%; }
    .col-actions { width: 88px; flex-shrink: 0; display: flex; justify-content: flex-end; gap: var(--sp-2); align-items: center; }

    /* Add subject row */
    .add-subject-row {
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      background-color: var(--bg-subtle);
      border-top: 1px solid var(--border-subtle);
      align-items: center;
      flex-wrap: wrap;
    }

    .add-subject-row .form-input {
      flex: 2;
      min-width: 120px;
    }

    .add-subject-row .form-input.narrow {
      flex: 1;
      min-width: 80px;
    }

    /* Add semester form */
    .add-semester-form {
      display: flex;
      gap: var(--sp-3);
      align-items: flex-end;
      flex-wrap: wrap;
      padding: var(--sp-5);
      background-color: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      margin-bottom: var(--sp-8);
    }

    .add-semester-form .form-group {
      flex: 1;
      min-width: 160px;
    }

    /* ── Statische Noten-/ECTS-Anzeige ── */
    .grade-display,
    .ects-display {
      font-family: 'Eczar', Georgia, serif;
      font-weight: 700;
      font-size: var(--text-md);
      color: var(--fg);
    }

    .subject-actions {
      display: flex;
      gap: var(--sp-2);
      align-items: center;
      justify-content: flex-end;
    }

    /* ── Expand-Toggle (Pfeil links neben Fachname) ── */
    .expand-toggle {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--fg-3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: var(--r-sm);
      margin-right: var(--sp-1);
      flex-shrink: 0;
      transition: color var(--t-fast), transform var(--t-fast), background-color var(--t-fast);
      vertical-align: middle;
    }

    .expand-toggle:hover {
      color: var(--fg);
      background-color: var(--bg-muted);
    }

    .expand-toggle.expanded {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* ── col-name braucht Flex für Button+Text nebeneinander ── */
    .col-name {
      display: flex;
      align-items: center;
    }

    /* ── Teilleistungen-Panel (ein- und ausklappbar) ── */
    .sub-grades-row {
      display: none;
    }

    .sub-grades-row.is-expanded {
      display: block;
    }

    .sub-grades-inner {
      border-left: 3px solid var(--accent);
      background-color: var(--bg-subtle);
    }

    /* Flex-Zeilen innerhalb des Panels */
    .sg-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-4);
      border-bottom: 1px solid var(--border-subtle);
    }

    .sg-row:last-child {
      border-bottom: none;
    }

    .sg-col-name {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-sm);
      color: var(--fg-2);
    }

    .sg-col-date {
      width: 130px;
      flex-shrink: 0;
    }

    .sg-col-date .form-input {
      width: 100%;
    }

    .sg-col-note {
      width: 80px;
      flex-shrink: 0;
    }

    /* Note-Input in Sub-Grade-Zeilen: gleiche Breite wie Spalte */
    .sg-col-note .form-input {
      width: 100% !important;
    }

    .sg-col-actions {
      width: 88px;
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: var(--sp-2);
    }

    .sub-grade-tree-char {
      color: var(--fg-3);
      font-size: var(--text-xs);
      flex-shrink: 0;
    }

    /* ── Berechnete Note (readonly aus Teilleistungen) ── */
    .computed-grade {
      font-family: 'Eczar', Georgia, serif;
      font-weight: 700;
      font-size: var(--text-md);
      cursor: help;
      display: inline-block;
      vertical-align: middle;
      /* text-decoration statt border-bottom → kein Einfluss auf Zeilenhöhe */
      text-decoration: underline;
      text-decoration-style: dashed;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
    }

    /* ── Semesterschnitt-Block (ECTS + ungewichtet) ── */
    .sem-avg-block {
      display: flex;
      gap: var(--sp-3);
      align-items: center;
    }

    .sem-avg-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .sem-avg-label {
      font-size: 9px;
      color: var(--fg-3);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
      font-family: 'Onest', sans-serif;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-header anim-up-1">
      <h1>Module</h1>
      <p>Module und Prüfungsleistungen eintragen – dein Schnitt wird automatisch ECTS-gewichtet berechnet.</p>
    </div>

    <!-- Gesamtüberblick -->
    <div class="grade-summary anim-up-2" id="gradeSummary"></div>

    <!-- Semester hinzufügen -->
    <div class="add-semester-form anim-up-3">
      <div class="form-group">
        <label class="form-label" for="semesterNameInput">Neues Semester</label>
        <input class="form-input" type="text" id="semesterNameInput"
               placeholder="z.B. WS 24/25 oder SoSe 25" maxlength="40" />
      </div>
      <button class="btn btn-primary" id="addSemesterBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Semester anlegen
      </button>
    </div>

    <!-- Semester-Liste -->
    <div id="semesterList">
      <div class="empty-state" style="padding-top: var(--sp-20)">
        <div class="empty-state-icon">📚</div>
        <p>Noch kein Semester angelegt.<br>Erstelle dein erstes Semester oben.</p>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/module.js"></script>
</body>
</html>
