<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow – Lernplan</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .exam-plans-grid {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    .plan-progress {
      margin-bottom: var(--sp-4);
    }

    .plan-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-sm);
      color: var(--fg-2);
      margin-bottom: var(--sp-2);
    }

    .plan-progress-bar {
      height: 8px;
      background: var(--bg-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .plan-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .today-plan-info {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-5);
    }
    .today-plan-info .plan-stat-val {
      font-family: var(--font-serif);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--accent-on-bg);
      line-height: 1;
    }
    .today-plan-info .plan-stat-label {
      font-size: var(--text-sm);
      color: var(--fg-2);
      line-height: 1.3;
    }
    .today-plan-info.done .plan-stat-val {
      color: var(--cal-study);
    }

    .weekday-row {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .weekday-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-1);
    }

    .weekday-item-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
    }

    .weekday-item-label:hover { color: var(--fg-1); }

    .weekday-item .day-cb {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .weekday-hours {
      width: 54px;
      text-align: center;
      padding: var(--sp-1) var(--sp-2);
      font-size: var(--text-sm);
    }

    .plan-save-row {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--sp-4);
    }

    .no-plan-hint {
      font-size: var(--text-sm);
      color: var(--fg-3);
      margin-bottom: var(--sp-3);
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="page-header anim-up-1">
      <h1>Lernplan</h1>
      <p>Plane deine Lernzeit individuell für jede anstehende Prüfung.</p>
    </div>

    <div id="examPlansList" class="exam-plans-grid"></div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/lernplan.js"></script>
</body>
</html>
